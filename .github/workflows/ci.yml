name: CI

# Runs on every PR and on pushes to the default branch. Four jobs: style/typing once; the
# dependency-free core across the OS and Python matrix; the peripheral packages with the optional
# extras installed (so the pyBIG/PyQt6 suites run); and a packaging job that builds and
# smoke-tests the wheel.
on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Style and typing are platform- and version-independent: run them once, and fail fast.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff==0.15.22 mypy==2.3.0  # pinned ruff matches .pre-commit-config.yaml

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy typing coverage
        run: mypy

  # The dependency-free core, on every supported interpreter and OS: the parser and linter run
  # with nothing but the stdlib, down to the 3.12 floor.
  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package (no extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Core test suite
        run: pytest -q

  # The peripheral packages, with the optional extras installed so the pyBIG- and Qt-backed
  # suites run. `--full` also enables the corpus acceptance gates; those self-skip when the
  # (gitignored) game-data corpus is absent, which it always is here.
  full:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      # PyQt6's wheel bundles Qt but still links the system's EGL/GL and xkb libraries, which
      # the GitHub runner image does not carry. The suites themselves force the `offscreen`
      # platform plugin, so no display server (or xvfb) is needed beyond these.
      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install the package with extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest

      # `shell: bash` runs on every runner (Windows included) with `-eo pipefail`, so a
      # pytest failure propagates through the `tee` pipe below.
      - name: Full test suite
        shell: bash
        run: |
          pytest -q --full -rs | tee pytest-full.log
          # Every optional-dependency guard (`importorskip`) names an extra in its skip
          # reason; the game-data corpus skips never contain the word "extra". With all
          # extras installed above, a skip that names one means a dependency is missing
          # from this job - fail loudly rather than silently not running its suite. (grep
          # inside the `if` condition is exempt from `-e`, so no-match is not an error.)
          if grep -E "^SKIPPED.*extra" pytest-full.log; then
            echo "::error::A test skipped for a missing optional dependency (see above); add it to the extras installed in this job."
            exit 1
          fi

  # A wheel is not the source tree: package data must be declared to ship, and the console
  # scripts have to work from an installed distribution rather than from the checkout.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build the distributions
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build

      - name: Check the metadata renders on PyPI
        run: twine check dist/*

      - name: Install the wheel into a clean environment
        run: |
          python -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install dist/*.whl

      # The core CLIs must run with no extras installed at all; the desktop apps must refuse
      # with the pip command to fix it, rather than a bare ModuleNotFoundError traceback.
      - name: Console scripts work without extras
        run: |
          for script in sage-lint sage-ini sage-edain sage-replay sage-apt sage-save sage-map sage-asset; do
            echo "== $script"
            /tmp/wheelenv/bin/$script --help > /dev/null
          done

      - name: Desktop scripts explain the missing extra
        run: |
          for script in sage-ui sage-wiki sage-lint-ui sage-edain-lint sage-asset-ui; do
            echo "== $script"
            if /tmp/wheelenv/bin/$script > /tmp/out.txt 2>&1; then
              echo "expected a non-zero exit without the extra installed"; exit 1
            fi
            grep -q "pip install" /tmp/out.txt || { echo "no install hint:"; cat /tmp/out.txt; exit 1; }
          done
